<!DOCTYPE html><html lang="en"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<meta name="robots" content="noindex">
<title>Change Admin PIN (OTP) — WTPeSTORE</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHZpZXdCb3g9IjAgMCA2NCA2NCI+PHJlY3Qgd2lkdGg9IjY0IiBoZWlnaHQ9IjY0IiByeD0iMTQiIGZpbGw9IiMxOWMzN2QiLz48cGF0aCBkPSJNMzIgMTBDMzIgMTAgMTYgMzAgMTYgNDJhMTYgMTYgMCAwIDAgMzIgMEM0OCAzMCAzMiAxMCAzMiAxMFoiIGZpbGw9IiNmZmYiLz48L3N2Zz4=">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{--navy:#0B2A4A;--green:#19c37d;--teal:#0aa2c0;--orange:#ff9900;--bg:#eef2f5;--card:#fff;--border:#d5d9d9;--muted:#5b6b76}
*{margin:0;padding:0;box-sizing:border-box}body{font-family:'Inter',Arial,sans-serif;background:var(--bg);color:#0f1111}
header{background:var(--navy);color:#fff;padding:14px 18px;display:flex;align-items:center;gap:12px}
header .l{font-weight:800;font-size:17px}header .l i{color:var(--green);font-style:normal}header .l u{color:var(--orange);text-decoration:none}
header a{margin-left:auto;color:#cfe0ea;font-size:13px;font-weight:600}
.wrap{max-width:460px;margin:30px auto;padding:0 14px}
.card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:24px}
h1{font-size:19px;color:var(--navy);margin-bottom:4px}.sub{font-size:13px;color:var(--muted);margin-bottom:16px}
label{display:block;font-size:12.5px;font-weight:700;color:var(--navy);margin:14px 0 5px}
input{width:100%;padding:11px 12px;border:1px solid var(--border);border-radius:9px;font-size:15px;font-family:inherit}
input:focus{outline:2px solid var(--teal);border-color:var(--teal)}
.btn{background:var(--green);color:#fff;border:none;padding:13px 20px;border-radius:10px;font-size:15px;font-weight:700;cursor:pointer;width:100%;margin-top:16px}
.btn:hover{background:#15a86b}.btn:disabled{opacity:.6;cursor:not-allowed}
.btn.sec{background:#fff;color:var(--navy);border:1.5px solid var(--border)}
.msg{margin-top:14px;padding:11px 14px;border-radius:9px;font-size:13px;font-weight:600;display:none;line-height:1.5}
.msg.ok{background:#e7f8f0;color:#0e7d52;border:1px solid #b6e6d1;display:block}
.msg.err{background:#fdecec;color:#b3261e;border:1px solid #f3c2bf;display:block}
.msg.info{background:#eef6fb;color:#0e4d6b;border:1px solid #c3e0ef;display:block}
.step2{display:none}
.note{font-size:11.5px;color:var(--muted);margin-top:14px;line-height:1.5}
</style></head><body>
<header><span class="l">💧 WTP<i>e</i><u>STORE</u> Admin</span><a href="/admin.html">← Admin Hub</a></header>
<div class="wrap"><div class="card">
<h1>🔑 Change Admin PIN (OTP)</h1>
<div class="sub">Naya PIN set karne ke liye pehle OTP mangao. OTP aapke registered mobile/email par aayega.</div>

<div id="step1">
<button class="btn" id="sendbtn" onclick="sendOTP()">📩 Send OTP</button>
</div>

<div class="step2" id="step2">
<label>Enter OTP</label>
<input id="otp" inputmode="numeric" placeholder="6-digit OTP">
<label>New PIN (4-6 digits)</label>
<input id="newpin" type="password" inputmode="numeric" placeholder="New PIN">
<label>Confirm New PIN</label>
<input id="newpin2" type="password" inputmode="numeric" placeholder="Repeat New PIN">
<button class="btn" onclick="verifyAndChange()">✅ Verify OTP &amp; Change PIN</button>
<button class="btn sec" style="margin-top:8px" onclick="sendOTP()">↺ Resend OTP</button>
</div>

<div class="msg" id="msg"></div>
<div class="note">OTP 10 minute tak valid rehta hai. PIN sirf isi browser me change hota hai — jis device par admin use karte ho, wahi PIN badlein.</div>
</div></div>

<script>
/* ===== CONFIG ===== */
var APPS_SCRIPT_URL = "";        // <-- OTP Apps Script ka /exec URL paste karo
var SECRET = "wtp-otp-2026";     // <-- Apps Script wala same ADMIN_SECRET
/* ================== */

function showMsg(t,c){var m=document.getElementById('msg');m.className='msg '+c;m.textContent=t;}
function jsonp(url,cb){
  var fn='cb_'+Math.floor(Math.random()*1e9);
  window[fn]=function(r){try{cb(r);}finally{delete window[fn];s.remove();}};
  var s=document.createElement('script');
  s.src=url+(url.indexOf('?')<0?'?':'&')+'callback='+fn;
  s.onerror=function(){cb({ok:false,error:'network'});try{delete window[fn];s.remove();}catch(e){}};
  document.body.appendChild(s);
}
function sendOTP(){
  if(!APPS_SCRIPT_URL){showMsg('OTP Apps Script URL set nahi hai (CONFIG me daalein).','err');return;}
  showMsg('OTP bheja ja raha hai…','info');
  document.getElementById('sendbtn').disabled=true;
  jsonp(APPS_SCRIPT_URL+'?action=send&token='+encodeURIComponent(SECRET),function(r){
    document.getElementById('sendbtn').disabled=false;
    if(r&&r.ok){document.getElementById('step2').style.display='block';showMsg('✅ OTP bhej diya gaya. Apna mobile/email check karein.','ok');}
    else{showMsg('OTP nahi bhej paye: '+((r&&r.error)||'error'),'err');}
  });
}
function verifyAndChange(){
  var otp=(document.getElementById('otp').value||'').trim();
  var p1=(document.getElementById('newpin').value||'').trim();
  var p2=(document.getElementById('newpin2').value||'').trim();
  if(!otp){showMsg('OTP daalein.','err');return;}
  if(p1.length<4){showMsg('PIN kam se kam 4 digit ka ho.','err');return;}
  if(p1!==p2){showMsg('Dono PIN alag hain.','err');return;}
  showMsg('Verify ho raha hai…','info');
  jsonp(APPS_SCRIPT_URL+'?action=verify&token='+encodeURIComponent(SECRET)+'&otp='+encodeURIComponent(otp),function(r){
    if(r&&r.ok){
      try{localStorage.setItem('wtpe_admin_pin',p1);}catch(e){}
      showMsg('🎉 PIN change ho gaya! Ab admin pages me naya PIN use karein.','ok');
      document.getElementById('step2').style.display='none';
    }else{
      showMsg('Galat/expired OTP: '+((r&&r.error)||'error'),'err');
    }
  });
}
</script>
</body></html>
