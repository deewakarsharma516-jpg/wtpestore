<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 360" role="img" aria-label="Water softener illustration">
<defs>
<linearGradient id="sbg" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#0B2A4A"/><stop offset="1" stop-color="#0e4d6b"/></linearGradient>
<linearGradient id="tank" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#bfeefb"/><stop offset="1" stop-color="#7ff0ff"/></linearGradient>
<linearGradient id="brine" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#e9f6fb"/><stop offset="1" stop-color="#bcdded"/></linearGradient>
</defs>
<rect width="640" height="360" fill="url(#sbg)"/>
<g stroke="#ffffff" stroke-opacity="0.05"><path d="M0 90H640M0 180H640M0 270H640"/></g>
<rect x="0" y="300" width="640" height="60" fill="#08213b"/><rect x="0" y="298" width="640" height="4" fill="#7ff0ff" opacity="0.35"/>
<!-- resin tank -->
<g>
<rect x="150" y="110" width="120" height="190" rx="58" fill="url(#tank)" stroke="#0e4d6b" stroke-width="2"/>
<rect x="150" y="210" width="120" height="90" rx="20" fill="#0e4d6b" opacity="0.18"/>
<g fill="#0e4d6b" opacity="0.3"><circle cx="180" cy="235" r="5"/><circle cx="205" cy="250" r="5"/><circle cx="230" cy="235" r="5"/><circle cx="245" cy="258" r="5"/><circle cx="170" cy="262" r="5"/><circle cx="215" cy="275" r="5"/></g>
<!-- valve head -->
<rect x="178" y="86" width="64" height="34" rx="8" fill="#13384f" stroke="#2b5a74"/>
<circle cx="210" cy="103" r="9" fill="#ff9900"/>
</g>
<!-- brine tank -->
<g>
<rect x="330" y="150" width="96" height="150" rx="12" fill="#0e3450" stroke="#3a6580" stroke-width="2"/>
<rect x="338" y="220" width="80" height="76" rx="6" fill="url(#brine)"/>
<text x="378" y="262" text-anchor="middle" font-family="Inter,Arial,sans-serif" font-size="13" font-weight="800" fill="#0B2A4A">SALT</text>
<rect x="346" y="138" width="64" height="20" rx="6" fill="#13384f" stroke="#2b5a74"/>
</g>
<!-- connecting pipe -->
<path d="M242 100 H300 a8 8 0 0 1 8 8 V150" fill="none" stroke="#7ff0ff" stroke-width="6" stroke-linecap="round" opacity="0.8"/>
<!-- soft water out + drops -->
<path d="M270 200 H300" fill="none" stroke="#7ff0ff" stroke-width="6" stroke-linecap="round" opacity="0"/>
<path d="M426 210 H470 a10 10 0 0 1 10 10 V270" fill="none" stroke="#2bb9d6" stroke-width="7" stroke-linecap="round"/>
<g fill="#7ff0ff"><path d="M480 282c0 6-4 10-9 10s-9-4-9-10 9-16 9-16 9 10 9 16Z"/><circle cx="500" cy="298" r="3" opacity="0.6"/></g>
<!-- title chip -->
<g><rect x="40" y="38" width="220" height="40" rx="20" fill="#ffffff" fill-opacity="0.10" stroke="#7ff0ff" stroke-opacity="0.4"/><circle cx="64" cy="58" r="9" fill="#ff9900"/><text x="84" y="64" font-family="Inter,Arial,sans-serif" font-size="20" font-weight="800" fill="#ffffff">Water Softener</text></g>
</svg>
